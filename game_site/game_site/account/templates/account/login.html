{% extends "website/base.html" %}

{% block content %}
<div class="auth-container">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Log In</button>
    </form>

    <a href="{% url 'account:password_reset' %}">Forgot password</a>
</div>
{% endblock %}
