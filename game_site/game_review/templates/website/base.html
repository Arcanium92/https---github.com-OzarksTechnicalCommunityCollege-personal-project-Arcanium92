{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Game Reviews{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'game_review/style.css' %}">
</head>

<body>

    <!-- Navigation -->
    <nav>
        <div>
            <a href="{% url 'home' %}">Home</a> |
            <a href="{% url 'add_review' %}">Add Review</a> |
            <a href="{% url 'review_list' %}">All Reviews</a>
        </div>

        <!-- Login/logut buttons -->
        <div class="login_logout_nav">
            <a href="{% url 'login' %}">Login</a> |
            <!-- Create if condition for logout button to display only if user is not logged in -->
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
